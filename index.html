<!DOCTYPE html>
<html lang="pt_br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>DevClub - Currency Converter</title>
</head>

<body>

    <img class="logo" src="./assets/logo2.gif" alt="logo-currency-converter">

    <main class="container">

        <label >
            Converter de
            <select class="currency-to-convert">
                <option value="real">R$ Real Brasileiro</option>
                <option  value="dolar">US$ Dólar Americano</option>
                <option  value="euro">€$ Euro</option>
            </select>
        </label>

        <label >
            Para
            <select class="select-currency">
                <option  value="dolar">US$ Dólar Americano</option>
                <option  value="euro">€$ Euro</option>
                <option value="real">R$ Real Brasileiro</option>
                <option value="libra">£$ Libra Esterlina</option>
                <option value="iene">¥$ Iene Japonês</option>
            </select>
        </label>

        <label >
            Valor
            <input type="text" placeholder="$0.0">
        </label>
        <button>Converter</button>

        <section class="currency-box">
            <div class="brazil">
                <img src="./assets/real.png" alt="bandeira-brasil" class="flags">
                <p class="currency">Real</p>
                <p class="currency-real">R$ 0,0</p>
            </div>

            <img src="./assets/seta.png" alt="arrow" class="arrow">

            <div class="usa">
                <img src="./assets/dolar.png" alt="flag-eua" class="change-flag" width="44px" height="44px">
                <p class="currency-name">Dólar Americano</p>
                <p class="currency-dolar">US$ 0.0</p>
            </div>
            
        </section>

    </main>

</body>

<script src="./script.js"></script>

</html>
